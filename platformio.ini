; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = HW1_3, HW1_3_V2

[pico_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
test_ignore = *
debug_tool = cmsis-dap
upload_protocol = cmsis-dap
debug_speed = 5000
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem1201
monitor_filters = direct
lib_deps =
	tempo
	olikraus/U8g2@^2.35.19
	arduinogetstarted/ezButton@^1.0.4
	mathertel/RotaryEncoder@^1.5.3
	khoih-prog/RPI_PICO_TimerInterrupt@^1.3.1

[env:HW1_3]
extends = pico_base
build_flags =
	-DHW1_3
	-DVERSION="\"1.0.0\""
build_src_filter = 
	-<*> 
	+<main.cpp> 
	+<v1/**/*.cpp>

[env:HW1_3_V2]
extends = pico_base
extra_scripts = post:scripts/compiledb_inject_headers.py
build_flags =
	-DHW1_3_V2
	-DVERSION="\"2.0.0-dev\""
build_src_filter =
	-<*>
	+<main.cpp>
	+<v2/**/*.cpp>

[env:native]
platform = native
build_type = test
test_framework = googletest
build_flags =
	-std=gnu++17
	-DUNIT_TEST
	-I include
	-I test/mocks
	-I lib/AP33772
	-Wno-missing-template-arg-list-after-template-kw
lib_deps =
	tempo
	fabiobatsilva/ArduinoFake @ ^0.4.0

[env:native_clangd]
platform = native
extra_scripts = pre:scripts/compiledb_set_test_paths.py
test_ignore = *
build_src_filter =
	-<*>
	+<../test/**/*.cpp>
build_flags =
	-std=gnu++17
	-DUNIT_TEST
	-I include
	-I test/mocks
	-I lib/AP33772
	-Wno-missing-template-arg-list-after-template-kw
lib_deps =
	tempo
	fabiobatsilva/ArduinoFake @ ^0.4.0
	google/googletest @ ^1.17.0
