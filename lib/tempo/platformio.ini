; PlatformIO — build and test the tempo library standalone (run from lib/tempo).
;   Firmware: pio run -e pico
;   Unit tests: pio test -e native  (googletest; pio run -e native is not used)

[platformio]
default_envs = pico, native
extra_configs = ../../scripts/fmt_flags.ini

[pico_common]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
test_ignore = *
build_flags =
	${fmt_size_flags.build_flags}
lib_deps =
	fmt=https://github.com/fmtlib/fmt.git#11.2.0

[env:pico]
extends = pico_common
extra_scripts = pre:../../scripts/configure_fmt_header_only.py
build_src_filter =
	+<tempo.cpp>
	+<main_pico.cpp>

[env:native]
platform = native
build_type = test
test_framework = googletest
extra_scripts = pre:../../scripts/configure_fmt_header_only.py
build_src_filter = +<tempo.cpp>
build_flags =
	-std=gnu++17
	-DUNIT_TEST
	${fmt_size_flags.build_flags}
	-I include
	-Wno-missing-template-arg-list-after-template-kw
lib_deps =
	fmt=https://github.com/fmtlib/fmt.git#11.2.0
	fabiobatsilva/ArduinoFake @ ^0.4.0
	google/googletest @ ^1.17.0
